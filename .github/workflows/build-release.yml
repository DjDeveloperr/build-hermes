name: Build Hermes Release

on:
  push:
    branches:
      - main
  workflow_dispatch:

permissions:
  contents: write

concurrency:
  group: build-hermes-${{ github.ref }}
  cancel-in-progress: false

jobs:
  build:
    runs-on: macos-latest
    timeout-minutes: 180

    env:
      UPSTREAM_COMMIT: eb461d844d69853cd12de4b0af7b271dcfbb085a
      NODE_API_DONOR_REF: node-api-hermes-2025-09-01-RNv0.82.0-265ef62ff3eb7289d17e366664ac0da82303e101

    steps:
      - name: Check out repo
        uses: actions/checkout@v4

      - name: Build xcframework
        run: |
          mkdir -p dist
          WORK_ROOT="$RUNNER_TEMP/build-hermes" \
          IOS_NEXT_DIR="$RUNNER_TEMP/ios-next" \
          OUTPUT_XCFRAMEWORK="$GITHUB_WORKSPACE/dist/hermes.xcframework" \
          OUTPUT_HEADERS_DIR="$GITHUB_WORKSPACE/dist/hermes-headers" \
          OUTPUT_TOOLS_DIR="$GITHUB_WORKSPACE/dist/hermes-tools-macos" \
          ./build_hermes_for_ios_next.sh

      - name: Package release assets
        run: |
          rm -f dist/hermes-xcframework.zip
          rm -f dist/hermes-headers.tar.gz
          rm -f dist/hermes-tools-macos.tar.gz
          ditto -c -k --sequesterRsrc --keepParent \
            dist/hermes.xcframework \
            dist/hermes-xcframework.zip
          tar -C dist -czf dist/hermes-headers.tar.gz hermes-headers
          tar -C dist -czf dist/hermes-tools-macos.tar.gz hermes-tools-macos

      - name: Upload workflow artifact
        uses: actions/upload-artifact@v4
        with:
          name: hermes-release-assets
          path: |
            dist/hermes-xcframework.zip
            dist/hermes-headers.tar.gz
            dist/hermes-tools-macos.tar.gz
          if-no-files-found: error

      - name: Publish draft release
        env:
          GH_TOKEN: ${{ github.token }}
          GITHUB_SHA: ${{ github.sha }}
        run: |
          TAG="build-${GITHUB_SHA::12}"
          TITLE="Hermes build ${GITHUB_SHA::7}"
          NOTES_FILE="$RUNNER_TEMP/release-notes.md"

          cat > "$NOTES_FILE" <<EOF
          NativeScript-ready Hermes xcframework build.

          - Upstream commit: \`$UPSTREAM_COMMIT\`
          - Node-API donor ref: \`$NODE_API_DONOR_REF\`
          - Source commit: \`${GITHUB_SHA}\`
          EOF

          if gh release view "$TAG" >/dev/null 2>&1; then
            gh release upload "$TAG" \
              dist/hermes-xcframework.zip \
              dist/hermes-headers.tar.gz \
              dist/hermes-tools-macos.tar.gz \
              --clobber
            gh release edit "$TAG" \
              --draft \
              --title "$TITLE" \
              --notes-file "$NOTES_FILE"
          else
            gh release create "$TAG" \
              dist/hermes-xcframework.zip \
              dist/hermes-headers.tar.gz \
              dist/hermes-tools-macos.tar.gz \
              --draft \
              --title "$TITLE" \
              --target "$GITHUB_SHA" \
              --notes-file "$NOTES_FILE"
          fi
